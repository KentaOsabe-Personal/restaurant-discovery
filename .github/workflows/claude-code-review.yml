name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR #${{ github.event.pull_request.number }} のコードレビューを実施してください（リポジトリ: ${{ github.repository }}）。

            手順:
            1. `gh pr diff ${{ github.event.pull_request.number }}` で変更内容を確認する
            2. コード品質・バグ・セキュリティ・テストカバレッジ・設計の観点でレビューする
            3. 必ず Bash ツールで以下のコマンドを実行してレビュー結果を保存すること:
               printf '%s' "ここにレビュー内容" > "${{ github.workspace }}/review_result.md"

            レビュー結果のフォーマット（必ず以下の構成で書くこと）:
            ## Claude Code Review

            ### レビュー観点
            - （確認した観点を箇条書きで列挙する）

            ### 結果
            （問題がある場合）**要修正あり**
            - 指摘事項と改善提案を具体的に記載する

            （問題がない場合）**LGTM ✅**
            - 問題がないと判断した理由を具体的に記載する

            **必須**: 問題の有無にかかわらず必ず `${{ github.workspace }}/review_result.md` に書き込むこと。

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_FILE: ${{ github.workspace }}/review_result.md
        run: |
          if [ -f "$REVIEW_FILE" ] && [ -s "$REVIEW_FILE" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "$(cat "$REVIEW_FILE")" \
              --repo ${{ github.repository }}
          else
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "## Claude Code Review

              レビューを実施しましたが、結果ファイルの生成に失敗しました。ワークフローのログを確認してください。" \
              --repo ${{ github.repository }}
          fi
