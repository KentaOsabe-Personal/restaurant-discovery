name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: '{"permissions":{"allow":["Bash"]}}'
          prompt: |
            PR #${{ github.event.pull_request.number }} のコードレビューを実施してください（リポジトリ: ${{ github.repository }}）。

            手順:
            1. `gh pr diff ${{ github.event.pull_request.number }}` で変更内容を確認する
            2. コード品質・バグ・セキュリティ・テストカバレッジ・設計の観点でレビューする
            3. 以下のフォーマットでレビュー結果を作成し、Bash ツールで `gh pr comment` を使って直接投稿すること:
               gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "ここにレビュー内容"

            レビュー結果のフォーマット（必ず以下の構成で書くこと）:
            ## Claude Code Review

            ### レビュー観点
            - （確認した観点を箇条書きで列挙する）

            ### 結果
            （問題がある場合）**要修正あり**
            - 指摘事項と改善提案を具体的に記載する

            （問題がない場合）**LGTM ✅**
            - 問題がないと判断した理由を具体的に記載する

            **必須**: 問題の有無にかかわらず必ず `gh pr comment` でコメントを投稿すること。
