name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR #${{ github.event.pull_request.number }} のコードレビューを実施してください（リポジトリ: ${{ github.repository }}）。

            手順:
            1. `gh pr diff ${{ github.event.pull_request.number }}` で変更内容を確認する
            2. コード品質・バグ・セキュリティ・テストカバレッジ・設計の観点でレビューする
            3. `gh pr comment ${{ github.event.pull_request.number }} --body "..."` で必ずコメントを投稿する

            **必須**: コメントは問題の有無にかかわらず必ず投稿すること。
            問題がある場合は具体的な指摘事項と改善提案を含め、問題がない場合は「LGTM」とレビュー内容の要約を記載すること。
