services:
  db:
    image: mysql:8.4.7
    container_name: restaurant_discovery_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: restaurant_discovery_development
      MYSQL_USER: app
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: restaurant_discovery_backend
    environment:
      DATABASE_HOST: db
      DATABASE_USER: app
      DATABASE_PASSWORD: password
      RAILS_ENV: development
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/rails
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: restaurant_discovery_frontend
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  bundle_data:
